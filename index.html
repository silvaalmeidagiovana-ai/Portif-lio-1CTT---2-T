<!DOCTYPE html> <!-- serve para indicar a linguagem de programação.-->
<html lang="pt-br"> <!--abertura dos códigos, delimita o documento. Todos os códigos\tags da página devem estar dentro desse espeço. -->
<head> <!-- define o cabeçalho do documento. Destro dessa tag pode ser inseridas folhas de estilo e script-->
    <meta charset="UTF-8"> <!-- indica qual será os caracteres (character set ou charset) será utilizado para renderizar o texto da página,-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--fornece metadados sobre a sua página web para navegadores e mecanismos de busca.-->
    <title>Document</title><!-- título do projeto.-->
</head> <!-- fechamento da tag do cabeçalho.-->
<body><!-- abertura do da tag, marcado o espaaço no qual deve estar contido o conteúdo visual da página. As demais tags que representam textp, botões e etc. Devem ser adicionados nesse intervalo.-->
    <!-- Documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechados, oque as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra no final, como o caso da tag meta. Outro aspecto importante da linguagem é que ela é case insensitive, ou seja, não leva em consideração a diferença entre letras oficiais a minúscula.-->
    
</body><!-- fechamento da tag do corpo do projeto.-->
</html><!--fechamento da tag-->
